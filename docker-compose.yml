services:
  # バックエンドの設定
  backend:
    build:
      context: ./backend
      dockerfile: ../Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env.local

  # フロントエンドの設定
  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env.local